<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        p{
            width: 300px;
            height: 300px;
            background-color: aqua;
            border: 2px solid blanchedalmond;
            padding: 50px;
            margin: 50px;
            border-radius: 50%;
        }
        *{
            border: 0;
            margin: 0px;
            box-sizing: border-box;
        }
        body{
            background: url("https://img.magnific.com/free-photo/wet-vietnam-mountain-flow-stream-rural_1417-1357.jpg");
            /* background-size: cover; */
            background-position: center;
            background-size: contain;
            
        }
    </style>
</head>
<body>
    <p>Hello</p>
</body>
</html>
