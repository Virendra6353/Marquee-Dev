<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0px;
            padding:0%;
            box-sizing: border-box;
        }
        .main{
                height: 100vh; 
                width: 100%; 
            background-color: whitesmoke;
        }
        .card{
            height: 300px;
            width: 300px;
            overflow: hidden;
            position: relative;
            background-color: aqua;
            top: 35%;
            left:35%;
            border-radius: 5%;
        }
        .heart{
            position: absolute;
            height: 30px;
            width: 30px;
            background-color: white;
            border-radius: 50%;
            top: 2%;
            left: 88%;
            padding: 4px;
            cursor: pointer;
        }
        .title{
            font-family:poppins;
            font-weight: 500;
            padding: 5px;
            font-size: x-large;
        }
        .price{
            padding: 5px;
            font-size: large;
            font-weight: 500;
            font-style: poppins;
        }
        button{
            height: 25%;
            width: 100%;
            border-radius: 10px;
            background-color: black;
            color: white;
            font-size: large;
            cursor: pointer;
            
        }
        .but{
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="card">
            <p class="heart">♥️</p>
            <img src="Untitled.jpg" alt="">
            <p class="title">Play Station 5</p>
            <p class="price">$ 699</p>
            <div class="but">
            <button>Add to cart</button></div>
        </div>
    </div>
</body>
</html>
